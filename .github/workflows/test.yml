name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system packages for Wand
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick libmagickwand-dev libmagickcore-dev build-essential pkg-config python3-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 app.py --max-line-length=120 || true

    - name: Build Docker image
      run: |
        docker build -t weather-api:latest .

    - name: Run container for smoke tests
      if: ${{ secrets.OPENWEATHER_API_KEY != '' }}
      run: |
        docker run -d --name weather-api-ci -e OPENWEATHER_API_KEY="${{ secrets.OPENWEATHER_API_KEY }}" -p 5000:5000 weather-api:latest
        for i in $(seq 1 15); do
          if curl -sSf http://localhost:5000/health >/dev/null; then echo "container healthy"; break; else sleep 1; fi
        done
        curl -sSf http://localhost:5000/health
      shell: bash

    - name: Remove test container
      if: always()
      run: |
        docker rm -f weather-api-ci || true
