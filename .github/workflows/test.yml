name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system packages for Wand
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick libmagickwand-dev libmagickcore-dev build-essential pkg-config python3-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 app.py --max-line-length=120 || true

    - name: Build Docker image
      run: |
        docker build -t weather-api:latest .
